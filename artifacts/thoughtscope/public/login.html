<!DOCTYPE html>
<!-- Replace SUPABASE_URL and SUPABASE_ANON_KEY with actual values if not using the defaults below -->
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ThoughtScope</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#10A37F',
            accent:  '#3B82F6',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0A0A0A; font-family: 'Inter', system-ui, sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #10A37F 0%, #3B82F6 100%); }
    .gradient-text { background: linear-gradient(135deg, #10A37F 0%, #3B82F6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .input-field { width: 100%; padding: 0.75rem 1rem; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 0.75rem; color: white; outline: none; transition: border-color .2s, box-shadow .2s; font-size: 0.875rem; }
    .input-field::placeholder { color: #6b7280; }
    .input-field:focus { border-color: #10A37F; box-shadow: 0 0 0 3px rgba(16,163,127,.12); }
    .btn-primary { width: 100%; padding: 0.75rem; background: linear-gradient(135deg, #10A37F 0%, #3B82F6 100%); border: none; border-radius: 0.75rem; color: white; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: opacity .2s; }
    .btn-primary:hover { opacity: .88; }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }
    .btn-outline { width: 100%; padding: 0.75rem; background: transparent; border: 1px solid #2a2a2a; border-radius: 0.75rem; color: #e5e7eb; font-weight: 500; font-size: 0.9rem; cursor: pointer; transition: background .2s, border-color .2s; display: flex; align-items: center; justify-content: center; gap: .5rem; }
    .btn-outline:hover { background: #1a1a1a; border-color: #3a3a3a; }
    .error-msg { display: none; padding: .75rem 1rem; background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); border-radius: .75rem; color: #fca5a5; font-size: .875rem; }
    .success-msg { display: none; padding: .75rem 1rem; background: rgba(16,163,127,.1); border: 1px solid rgba(16,163,127,.2); border-radius: .75rem; color: #6ee7b7; font-size: .875rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 1.1rem; height: 1.1rem; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; margin-right: .4rem; vertical-align: middle; }
    .glow { box-shadow: 0 0 40px rgba(16,163,127,.08); }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-4 py-12">

  <!-- Background glow -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-96 h-96 rounded-full" style="background:radial-gradient(circle,rgba(16,163,127,.07) 0%,transparent 70%)"></div>
  </div>

  <!-- Card -->
  <div class="relative w-full max-w-md">

    <!-- Logo -->
    <a href="/thoughtscope/" class="flex items-center justify-center gap-2.5 mb-8">
      <div class="w-9 h-9 rounded-xl gradient-bg flex items-center justify-center shadow-md">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <span class="font-bold text-xl text-white">ThoughtScope</span>
    </a>

    <div class="glow bg-[#141414] border border-[#1E1E1E] rounded-2xl p-8">
      <h1 class="text-2xl font-bold text-white mb-1">Welcome back</h1>
      <p class="text-gray-400 text-sm mb-7">Sign in to your ThoughtScope account</p>

      <!-- Google OAuth -->
      <button onclick="signInWithGoogle()" class="btn-outline mb-5">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>

      <div class="flex items-center gap-3 mb-5">
        <div class="flex-1 h-px bg-[#2a2a2a]"></div>
        <span class="text-gray-500 text-xs">or continue with email</span>
        <div class="flex-1 h-px bg-[#2a2a2a]"></div>
      </div>

      <!-- Form -->
      <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Email address</label>
          <input id="email" type="email" placeholder="you@example.com" required class="input-field" autocomplete="email" />
        </div>
        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label class="block text-sm font-medium text-gray-300">Password</label>
            <a href="#" onclick="handleForgotPassword()" class="text-xs text-primary hover:underline">Forgot password?</a>
          </div>
          <input id="password" type="password" placeholder="Enter your password" required class="input-field" autocomplete="current-password" />
        </div>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <button type="submit" id="loginBtn" class="btn-primary mt-1">Sign In</button>
      </form>
    </div>

    <!-- Footer links -->
    <div class="mt-6 text-center space-y-3">
      <p class="text-gray-400 text-sm">
        Don't have an account?
        <a href="/thoughtscope/signup.html" class="text-primary font-medium hover:underline ml-1">Sign Up</a>
      </p>
      <p class="text-gray-500 text-xs">
        Want early access?
        <a href="/thoughtscope/waitlist.html" class="text-accent hover:underline ml-1">Join the waiting list →</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Replace SUPABASE_URL and SUPABASE_ANON_KEY with actual values
    const SUPABASE_URL = 'https://acdrbtuhxpskuuimevwu.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjZHJidHVoeHBza3V1aW1ldnd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMzU4NTMsImV4cCI6MjA5MDcxMTg1M30.jIxOnGza9D1nBbEqnmglIKSK0L5pbkqkLb1iCZOGQdM';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Redirect if already logged in
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = '/thoughtscope/dashboard.html';
    });

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg; el.style.display = 'block';
      document.getElementById('successMsg').style.display = 'none';
    }
    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg; el.style.display = 'block';
      document.getElementById('errorMsg').style.display = 'none';
    }
    function setLoading(loading) {
      const btn = document.getElementById('loginBtn');
      btn.disabled = loading;
      btn.innerHTML = loading ? '<span class="spinner"></span>Signing in…' : 'Sign In';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      setLoading(true);
      document.getElementById('errorMsg').style.display = 'none';

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      setLoading(false);

      if (error) {
        showError(error.message === 'Invalid login credentials'
          ? 'Incorrect email or password. Please try again.'
          : error.message);
      } else {
        window.location.href = '/thoughtscope/dashboard.html';
      }
    }

    async function signInWithGoogle() {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/thoughtscope/dashboard.html' }
      });
      if (error) showError(error.message);
    }

    async function handleForgotPassword() {
      const email = document.getElementById('email').value.trim();
      if (!email) { showError('Enter your email address above first.'); return; }
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/thoughtscope/login.html'
      });
      if (error) showError(error.message);
      else showSuccess('Password reset email sent — check your inbox.');
    }
  </script>
</body>
</html>
