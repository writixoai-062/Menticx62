kind = "web"
previewPath = "/"
title = "Deep Researcher"
version = "1.0.0"
id = "artifacts/deep-researcher"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23954

[services.development]
run = "pnpm --filter @workspace/deep-researcher run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/deep-researcher", "run", "build" ]
publicDir = "artifacts/deep-researcher/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23954"
BASE_PATH = "/"
